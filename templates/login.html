<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — Account Creator</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-950 text-gray-100 min-h-screen flex items-center justify-center font-sans antialiased">

  <div class="w-full max-w-sm">
    <!-- Logo -->
    <div class="text-center mb-8">
      <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-indigo-600/20 border border-indigo-500/30 mb-4">
        <span class="text-3xl">⚙</span>
      </div>
      <h1 class="text-2xl font-bold">Account Creator</h1>
      <p class="text-gray-500 text-sm mt-1">Sign in to continue</p>
    </div>

    <!-- Card -->
    <div class="bg-gray-900 border border-gray-800 rounded-2xl p-8 shadow-2xl">
      {% if error %}
        <div class="mb-4 px-4 py-3 rounded-xl bg-red-950 border border-red-800 text-red-300 text-sm">
          {{ error }}
        </div>
      {% endif %}

      <form method="POST" action="/login">
        <label class="block text-sm font-medium text-gray-400 mb-1">Password</label>
        <input
          type="password"
          name="password"
          autofocus
          placeholder="Enter admin password"
          class="w-full px-4 py-3 rounded-xl bg-gray-800 border border-gray-700 text-white placeholder-gray-500
                 focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 transition text-sm"
        />
        <button type="submit"
          class="mt-4 w-full py-3 rounded-xl bg-indigo-600 hover:bg-indigo-500 active:bg-indigo-700
                 font-semibold text-sm transition">
          Sign In
        </button>
      </form>
    </div>
  </div>

</body>
</html>
